<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>OG</title>
<style>
  :root {
    --bg: #0b1020;
    --bg-2: #131a33;
    --fg: #e7ecf5;
    --fg-dim: #95a0bd;
    --accent: #facc15;
    --accent-2: #818cf8;
    --line: #2a3358;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: "Helvetica Neue", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    position: relative;
    padding: 64px 72px;
  }
  /* gradient glow */
  .glow-1 {
    position: absolute; width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(250,204,21,0.28), transparent 60%);
    top: -180px; left: -180px;
    pointer-events: none;
  }
  .glow-2 {
    position: absolute; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(129,140,248,0.22), transparent 60%);
    bottom: -160px; right: -120px;
    pointer-events: none;
  }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 80% 12%, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 40% 70%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 65% 80%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 22% 88%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 92% 55%, rgba(255,255,255,0.3), transparent);
    pointer-events: none;
  }
  .tag {
    position: relative;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 14px; color: var(--fg-dim);
    letter-spacing: 0.04em;
  }
  .tag .moon { font-size: 18px; }
  .title {
    position: relative;
    margin-top: 28px;
    font-size: 60px;
    font-weight: 800;
    line-height: 1.18;
    letter-spacing: -0.01em;
    max-width: 1000px;
  }
  .title .em { color: var(--accent); }
  .title .em2 { color: var(--accent-2); }
  .stat-row {
    position: absolute;
    left: 72px; right: 72px; bottom: 64px;
    display: flex; gap: 12px;
  }
  .stat {
    flex: 1;
    padding: 16px 18px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 12px;
    backdrop-filter: blur(4px);
  }
  .stat .num {
    font-size: 32px; font-weight: 800; letter-spacing: -0.02em;
    color: var(--accent);
  }
  .stat .label {
    margin-top: 4px;
    font-size: 13px; color: var(--fg-dim);
    letter-spacing: 0.04em;
  }
  .stat.alt .num { color: var(--accent-2); }
</style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="stars"></div>

  <div class="tag"><span class="moon">💤</span> Claude Code × 個人 OSS の継続改善</div>
  <div class="title">
    自分の OSS を <span class="em2">Claude Code</span> に任せたら、<br>
    <span class="em">寝ている間に 11 回リリース</span><br>されていた
  </div>

  <div class="stat-row">
    <div class="stat"><div class="num">5 日</div><div class="label">PERIOD</div></div>
    <div class="stat"><div class="num">17 回</div><div class="label">CYCLES</div></div>
    <div class="stat"><div class="num">11 回</div><div class="label">RELEASES</div></div>
    <div class="stat alt"><div class="num">22 件</div><div class="label">DEFERRED</div></div>
  </div>
</body>
</html>
